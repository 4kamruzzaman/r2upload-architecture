# Reference Architecture: Local Development Configuration
services:
  api:
    build:
      context: ./api
    ports:
      - "8000:80"
    volumes:
      - ./api:/var/www/html
    environment:
      - APP_ENV=local
      - DB_CONNECTION=pgsql
      - CACHE_STORE=database
      - QUEUE_CONNECTION=database
      - SESSION_DRIVER=database
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3100:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: r2upload
      POSTGRES_USER: r2upload
      POSTGRES_PASSWORD: secret_local

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
