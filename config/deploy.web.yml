# Reference Architecture: Web Destination (Next.js Frontend)
service: r2upload-web
image: bizsafer/r2upload-web-reference

servers:
  web:
    hosts:
      - <production-node-ip>
      - <production-node-ip>
      - <production-node-ip>
      - <production-node-ip>

deploy_timeout: 120
drain_timeout: 15

proxy:
  hosts:
    - r2upload.io
    - www.r2upload.io
  ssl: true
  app_port: 3000
  healthcheck:
    path: /
    interval: 3
    timeout: 3

env:
  clear:
    NODE_ENV: production
    PORT: "3000"
    HOSTNAME: "0.0.0.0"
    NEXT_PUBLIC_API_URL: https://api.r2upload.io
    NEXT_PUBLIC_APP_URL: https://r2upload.io
    NEXT_TELEMETRY_DISABLED: "1"
  secret: []
