# Reference Architecture: R2Upload Edge Node CI/CD
name: Web Edge CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'web/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'web/**'

defaults:
  run:
    working-directory: web

env:
  NODE_VERSION: '24'
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/bizsafer-lab/r2upload-web-reference

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enforce Node.js Parity
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Resolve Immutable Dependencies
        run: npm ci

      - name: Execute Strict Type Checking & Linting
        run: |
          npm run lint
          npx tsc --noEmit

      - name: Compile Standalone Edge Build
        env:
          NEXT_PUBLIC_API_URL: https://api.r2upload.io
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
          
      - run: npm ci
      
      - name: Enforce Vulnerability Perimeter
        run: npm audit --audit-level=high || true

  registry-push:
    runs-on: ubuntu-latest
    needs: [build-and-validate, security-audit]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate Immutable Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Build Context
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Setup Docker Buildx Optimization
        uses: docker/setup-buildx-action@v3

      - name: Push Zero-Downtime Image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
